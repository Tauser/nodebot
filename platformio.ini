; -------------------------------------------------------------------------
; NodeBot v1.0 - Configuração Final (Freenove ESP32-S3 16MB)
; -------------------------------------------------------------------------

[platformio]
; Mantém a nossa estrutura de Monorepo profissional
src_dir = firmware/src
include_dir = firmware/src

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
; upload_speed = 921600

; --- 3. MOTOR DO SISTEMA (Flags de Compilação)
build_flags = 
    ; ✅ ATIVAÇÃO DA PSRAM (Desta vez sem o ponto e vírgula!)
    ;-D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D CORE_DEBUG_LEVEL=3


; --- 4. BIBLIOTECAS (O seu arsenal completo)
lib_deps = 
    lovyan03/LovyanGFX @ ^1.2.19      ; Ajustado para versão estável conhecida
    esphome/ESP32-audioI2S@^2.0.7
    bblanchon/ArduinoJson@^6.21.5     ; Atualizado (Mantido na v6 para compatibilidade)
    ftservo/FTServo @ ^2.0.0
    fastled/FastLED @ ^3.7.0          ; Atualizado
    adafruit/Adafruit MPU6050 @ ^2.2.6 ; Atualizado
    adafruit/Adafruit Unified Sensor @ ^1.1.14 ; Atualizado
    earlephilhower/ESP8266Audio @ ^1.9.7
    ricmoo/QRCode @ ^0.0.1
    adafruit/Adafruit NeoPixel @ ^1.12.0