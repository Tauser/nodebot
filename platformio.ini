; -------------------------------------------------------------------------
; NodeBot v1.0 - Configuração Final (Freenove ESP32-S3 16MB)
; -------------------------------------------------------------------------

[platformio]
; Mantém a nossa estrutura de Monorepo profissional
src_dir = firmware/src
include_dir = firmware/src

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
; board_build.arduino.memory_type = qio_opi
board_build.arduino.memory_type = qio_qspi
; upload_speed = 921600

; --- 3. MOTOR DO SISTEMA (Flags de Compilação)
build_flags = 
    ; ✅ ATIVAÇÃO DA PSRAM (Desta vez sem o ponto e vírgula!)
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0 
    -D CORE_DEBUG_LEVEL=3 
    -I firmware/src
    

; --- 4. BIBLIOTECAS (O seu arsenal completo)
lib_deps = 
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3
    adafruit/Adafruit GFX Library @ ^1.11.5
    esphome/ESP32-audioI2S@^2.0.7
    bblanchon/ArduinoJson@^6.21.3
    ftservo/FTServo @ ^2.0.0
    fastled/FastLED @ ^3.6.0
    adafruit/Adafruit MPU6050 @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    earlephilhower/ESP8266Audio @ ^1.9.7
    ricmoo/QRCode @ ^0.0.1
    adafruit/Adafruit NeoPixel @ ^1.12.0